<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Applicazione web di steganografia">
    <meta name="author" content="Simon">
    <link rel="stylesheet" href="Encryption style.css">
    <title>Steganografia</title>
</head>
<body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="Encryption scrip.js"></script>
    <h1>Steganografia</h1>
    <div class="Insert">
        <label name="testo_da_cifrare" id="testo_label">Inserisci il testo</label>
        <br>
        <input type="text" id="testo_da_cifrare">
        <br><br>
        <label name="password">Inserisci la password</label><br>
        <input type="password" id="password">
        <br><br>
        <label>Scegli il canale (Chiave di sicurezza secondaria):</label>
        <div class="radio-group">
            <input type="radio" id="canale_r" name="colore_rgba" value="0" checked>
            <label for="canale_r" class="color-btn red-btn">R</label>

            <input type="radio" id="canale_g" name="colore_rgba" value="1">
            <label for="canale_g" class="color-btn green-btn">G</label>

            <input type="radio" id="canale_b" name="colore_rgba" value="2">
            <label for="canale_b" class="color-btn blue-btn">B</label>

            <input type="radio" id="canale_a" name="colore_rgba" value="3">
            <label for="canale_a" class="color-btn alpha-btn">A</label>
        </div>
    <br>        
        <button onclick="check()">Invia</button>
    </div>
        
    <h1>Immagine di partenza</h1>
    <img src="Cat_November_2010-1a_(cropped_2023).jpg" id="starting_pic" width="250" height="250">
    <h1>Immagine modificata</h1>
    <canvas id="modified_pic"></canvas>

    <button onclick="download()">Scarica immagine</button>
</body>
</html>
